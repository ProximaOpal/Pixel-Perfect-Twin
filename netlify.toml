# Deploy the Nexus Vite frontend (workspace-suite) as a static SPA.
[build]
  command = "corepack enable && corepack prepare pnpm@10.33.3 --activate && pnpm install && pnpm run build:web"
  publish = "artifacts/workspace-suite/dist/public"

[build.environment]
  NODE_VERSION = "22"
  # Skip scanning unused monorepo packages that aren't part of the web publish dir.
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

# SPA fallback so client routes (wouter) work on refresh / deep links.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
